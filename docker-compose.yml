services:
  backend-migrate:
    build:
      context: .
      dockerfile: Dockerfile.backend
    entrypoint: ["sh", "-c", "packages/db/node_modules/.bin/prisma migrate deploy --schema /app/prisma/schema.prisma"]
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/db.sqlite}
    volumes:
      - wps_data:/app/data
    restart: "no"
    logging: &json-file-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "4000:4000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-file:/app/data/db.sqlite}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      STORAGE_PROVIDER: ${STORAGE_PROVIDER:-local}
      STORAGE_LOCAL_PATH: /app/data/uploads
      MAX_FILE_SIZE_MB: ${MAX_FILE_SIZE_MB:-50}
      MAX_VIDEO_SIZE_MB: ${MAX_VIDEO_SIZE_MB:-200}
      SESSION_SECRET: ${SESSION_SECRET:?SESSION_SECRET is required}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      WEBHOOK_URL: ${WEBHOOK_URL:-}
      WEBHOOK_SECRET: ${WEBHOOK_SECRET:-}
      NTFY_TOPIC: ${NTFY_TOPIC:-}
      NOTIFICATION_TIMEOUT_MS: ${NOTIFICATION_TIMEOUT_MS:-5000}
      COOKIE_SECURE: ${COOKIE_SECURE:-true}
      TRUST_PROXY: ${TRUST_PROXY:-loopback, linklocal, uniquelocal}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      NODE_ENV: production
    volumes:
      - wps_data:/app/data
    depends_on:
      backend-migrate:
        condition: service_completed_successfully
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *json-file-logging
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1.0"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Public URL that browsers use to reach the API (not the internal Docker hostname)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        # Internal backend URL for Next.js server-to-server calls (rewrites + SSR)
        # Hardcoded to the Docker service name — never read from .env
        BACKEND_URL: http://backend:4000
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *json-file-logging
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: "0.5"

  backup:
    image: alpine:3.21
    entrypoint: ["/bin/sh", "-c"]
    command: |
      set -eu
      interval="$${BACKUP_INTERVAL_SECONDS:-86400}"
      retention="$${BACKUP_RETENTION_DAYS:-14}"
      mkdir -p /backups
      while true; do
        ts="$$(date +%Y%m%d-%H%M%S)"
        tar -czf "/backups/wps-$${ts}.tar.gz" -C /data .
        find /backups -type f -name 'wps-*.tar.gz' -mtime +"$${retention}" -delete
        sleep "$${interval}"
      done
    volumes:
      - wps_data:/data:ro
      - wps_backups:/backups
    restart: unless-stopped
    logging: *json-file-logging

volumes:
  wps_data:
  wps_backups:
