services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "4000:4000"
    environment:
      - DATABASE_URL=${DATABASE_URL:-file:/app/data/db.sqlite}
      - FRONTEND_URL=${FRONTEND_URL:-http://localhost:3000}
      - STORAGE_PROVIDER=${STORAGE_PROVIDER:-local}
      - STORAGE_LOCAL_PATH=/app/data/uploads
      - MAX_FILE_SIZE_MB=${MAX_FILE_SIZE_MB:-50}
      - MAX_VIDEO_SIZE_MB=${MAX_VIDEO_SIZE_MB:-200}
      - SESSION_SECRET=${SESSION_SECRET:?SESSION_SECRET is required}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:?ADMIN_PASSWORD is required}
      - WEBHOOK_URL=${WEBHOOK_URL:-}
      - WEBHOOK_SECRET=${WEBHOOK_SECRET:-}
      - NTFY_TOPIC=${NTFY_TOPIC:-}
      - NOTIFICATION_TIMEOUT_MS=${NOTIFICATION_TIMEOUT_MS:-5000}
      - COOKIE_SECURE=${COOKIE_SECURE:-true}
      - NODE_ENV=production
    volumes:
      - ./data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        # Public URL that browsers use to reach the API (not the internal Docker hostname)
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
        # Internal backend URL for Next.js server-to-server calls (rewrites + SSR)
        # Hardcoded to the Docker service name — never read from .env
        BACKEND_URL: http://backend:4000
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=http://backend:4000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fs", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'
