name: CI

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Lint, Typecheck, Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.12.3

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @wedding/db run db:generate

      - name: Build shared packages
        run: |
          pnpm --filter @wedding/shared build
          pnpm --filter @wedding/db build

      - name: Lint all packages
        run: pnpm lint

      - name: Typecheck all packages
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test
        env:
          DATABASE_URL: file::memory:?cache=shared

  coverage:
    name: Coverage Gates
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.12.3

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @wedding/db run db:generate

      - name: Build shared packages
        run: |
          pnpm --filter @wedding/shared build
          pnpm --filter @wedding/db build

      - name: Run backend coverage with thresholds
        run: pnpm --filter @wedding/backend test:coverage

      - name: Run frontend coverage with thresholds
        run: pnpm --filter @wedding/frontend test:coverage

  e2e-smoke:
    name: E2E Smoke
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.12.3

      - uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @wedding/db run db:generate

      - name: Build apps and shared packages
        run: |
          pnpm --filter @wedding/shared build
          pnpm --filter @wedding/db build
          pnpm --filter @wedding/backend build
          pnpm --filter @wedding/frontend build

      - name: Install Playwright Chromium
        run: pnpm --filter @wedding/frontend exec playwright install --with-deps chromium

      - name: Apply database migrations
        run: env DATABASE_URL=file:/tmp/wps-e2e.db pnpm db:migrate

      - name: Start backend
        run: |
          env PORT=4000 DATABASE_URL=file:/tmp/wps-e2e.db FRONTEND_URL=http://localhost:3000 STORAGE_LOCAL_PATH=/tmp/wps-e2e-uploads SESSION_SECRET=local-dev-session-secret-1234567890 ADMIN_PASSWORD=admin-local-dev COOKIE_SECURE=false pnpm --filter @wedding/backend run start > /tmp/backend.log 2>&1 &
          echo $! > /tmp/backend.pid
          for i in {1..60}; do
            if curl -sf http://localhost:4000/health > /dev/null; then
              break
            fi
            sleep 1
          done

      - name: Start frontend
        run: |
          env PORT=3000 BACKEND_URL=http://localhost:4000 NEXT_PUBLIC_API_URL=http://localhost:4000 pnpm --filter @wedding/frontend run start > /tmp/frontend.log 2>&1 &
          echo $! > /tmp/frontend.pid
          for i in {1..60}; do
            if curl -sf http://localhost:3000 > /dev/null; then
              break
            fi
            sleep 1
          done

      - name: Run smoke e2e
        run: env E2E_BASE_URL=http://localhost:3000 E2E_API_URL=http://localhost:4000 ADMIN_PASSWORD=admin-local-dev pnpm --filter @wedding/frontend exec playwright test e2e/happy-path.spec.ts --project=chromium

      - name: Stop servers
        if: always()
        run: |
          if [ -f /tmp/frontend.pid ]; then kill "$(cat /tmp/frontend.pid)" || true; fi
          if [ -f /tmp/backend.pid ]; then kill "$(cat /tmp/backend.pid)" || true; fi

  docker-images:
    name: Docker Build and Publish
    runs-on: ubuntu-latest
    needs: [test, coverage, e2e-smoke]
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-qemu-action@v4

      - uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (backend)
        id: meta_backend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/backend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_backend.outputs.tags }}
          labels: ${{ steps.meta_backend.outputs.labels }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Docker metadata (frontend)
        id: meta_frontend
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}/frontend
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and publish frontend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.frontend
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta_frontend.outputs.tags }}
          labels: ${{ steps.meta_frontend.outputs.labels }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
